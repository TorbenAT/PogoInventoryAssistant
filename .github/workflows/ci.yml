name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore .\PogoInventoryAssistant.sln

      - name: Build
        run: dotnet build .\PogoInventoryAssistant.sln --configuration Release --no-restore

      - name: Run self-tests
        run: dotnet run --project .\tests\PogoInventory.SelfTest --configuration Release --no-build

      - name: Run analysis demo
        run: >-
          dotnet run --project .\src\PogoInventory.Cli --configuration Release --no-build --
          analyze --inventory .\data\sample-inventory.json --policy .\data\policy.json --out .\out\analysis

      - name: Run fake device snapshot
        run: >-
          dotnet run --project .\src\PogoInventory.Cli --configuration Release --no-build --
          device-snapshot --fake --out .\out\fake-device

      - name: Run deterministic automatic inventory navigation
        run: >-
          dotnet run --project .\src\PogoInventory.Cli --configuration Release --no-build --
          inventory-scan --fake
          --profile .\data\automation-profile.synthetic.json
          --screen-profile .\data\screen-profile.synthetic.json
          --fixtures .\data\screen-fixtures
          --max-items 3
          --out .\out\automatic-inventory-scan

      - name: Verify structured fake observations
        shell: pwsh
        run: |
          $checkpoint = Get-Content .\out\automatic-inventory-scan\inventory-scan-checkpoint.json -Raw | ConvertFrom-Json
          if ($checkpoint.schemaVersion -ne "2.0") { throw "Expected checkpoint schema 2.0." }
          if ($checkpoint.items.Count -ne 3) { throw "Expected exactly three scan items." }
          $notComplete = @($checkpoint.items | Where-Object { $_.observation.status -ne "Complete" })
          if ($notComplete.Count -ne 0) { throw "All fake observations must be Complete." }
          $species = @($checkpoint.items | ForEach-Object { $_.observation.species })
          if (($species -join ",") -ne "Pikachu,Machop,Eevee") { throw "Unexpected fake species sequence." }

      - name: Run automatic core profile bootstrap
        run: >-
          dotnet run --project .\src\PogoInventory.Cli --configuration Release --no-build --
          profile-bootstrap --fake
          --profile .\data\automation-profile.synthetic.json
          --anchors .\data\calibration\core-anchor-plan.synthetic.json
          --fixtures .\data\screen-fixtures
          --out .\out\core-profile-bootstrap

      - name: Verify core profile bootstrap acceptance
        shell: pwsh
        run: |
          $report = Get-Content .\out\core-profile-bootstrap\acceptance\calibration-acceptance.json -Raw | ConvertFrom-Json
          if (-not $report.accepted) { throw "Automatic core profile bootstrap was rejected." }
          if ($report.falsePositiveCount -ne 0) { throw "Core profile has false positives." }
          if ($report.misclassificationCount -ne 0) { throw "Core profile has misclassifications." }

      - name: Run scripted Calcy inspection probe
        run: >-
          dotnet run --project .\src\PogoInventory.Cli --configuration Release --no-build --
          calcy-probe --fake
          --fixtures .\data\calcy-probe
          --out .\out\calcy-probe

      - name: Verify scripted Calcy inspection probe
        shell: pwsh
        run: |
          $report = Get-Content .\out\calcy-probe\calcy-probe-report.json -Raw | ConvertFrom-Json
          if (-not $report.package.isInstalled) { throw "Expected the scripted Calcy package to be installed." }
          if ($report.package.versionName -ne "4.3.1") { throw "Unexpected scripted Calcy version." }
          if ($report.filteredLogLineCount -ne 2) { throw "Expected exactly two filtered Calcy log lines." }
          if ($report.decision -ne "CandidateEvidenceFound") { throw "Unexpected Calcy probe decision." }

      - name: Run automatic scripted Calcy live check
        run: >-
          dotnet run --project .\src\PogoInventory.Cli --configuration Release --no-build --
          calcy-live-check --fake
          --profile .\data\automation-profile.synthetic.json
          --screen-profile .\data\screen-profile.synthetic.json
          --parser-profile .\data\calcy-parser-profile.synthetic.json
          --screen-fixtures .\data\screen-fixtures
          --probe-fixtures .\data\calcy-probe
          --settle-ms 0
          --out .\out\calcy-live-check

      - name: Verify automatic scripted Calcy live check
        shell: pwsh
        run: |
          $checkpoint = Get-Content .\out\calcy-live-check\navigation\inventory-scan-checkpoint.json -Raw | ConvertFrom-Json
          if ($checkpoint.items.Count -ne 1) { throw "Calcy live check must navigate to exactly one item." }
          $observation = Get-Content .\out\calcy-live-check\parsed-observation.json -Raw | ConvertFrom-Json
          if ($observation.status -ne "Complete") { throw "Calcy live check did not produce a Complete observation." }
          if ($observation.species -ne "Pikachu") { throw "Unexpected live-check species." }

      - name: Parse synthetic Calcy output
        run: >-
          dotnet run --project .\src\PogoInventory.Cli --configuration Release --no-build --
          calcy-parse
          --input .\data\calcy-output.synthetic.txt
          --profile .\data\calcy-parser-profile.synthetic.json
          --source-name logcat
          --out .\out\calcy-parser\observation.json

      - name: Verify synthetic Calcy observation
        shell: pwsh
        run: |
          $observation = Get-Content .\out\calcy-parser\observation.json -Raw | ConvertFrom-Json
          if ($observation.status -ne "Complete") { throw "Expected a Complete parsed Calcy observation." }
          if ($observation.species -ne "Pikachu") { throw "Unexpected parsed Calcy species." }
          if ($observation.cp -ne 501) { throw "Unexpected parsed CP." }
          if ($observation.attackIv -ne 15 -or $observation.defenseIv -ne 14 -or $observation.hpIv -ne 13) {
            throw "Unexpected parsed IV values."
          }

      - name: Verify twenty synthetic Calcy observations
        run: >-
          dotnet run --project .\src\PogoInventory.Cli --configuration Release --no-build --
          calcy-verification-run
          --manifest .\data\calcy-verification\manifest.synthetic.json
          --evidence-root .\data\calcy-verification
          --parser-profile .\data\calcy-parser-profile.synthetic.json
          --out .\out\calcy-verification

      - name: Verify Calcy provider gate
        shell: pwsh
        run: |
          $report = Get-Content .\out\calcy-verification\verification-report.json -Raw | ConvertFrom-Json
          if ($report.caseCount -ne 20) { throw "Expected twenty verification cases." }
          if ($report.exactCompleteCount -ne 20) { throw "Expected twenty exact Complete observations." }
          if ($report.wrongCompleteCount -ne 0) { throw "Expected zero wrong Complete observations." }
          if (-not $report.recommendedForLongScan) { throw "Synthetic provider did not pass the long-scan gate." }

      - name: Lock verified synthetic provider
        run: >-
          dotnet run --project .\src\PogoInventory.Cli --configuration Release --no-build --
          calcy-provider-select
          --report .\out\calcy-verification\verification-report.json
          --mechanism PidWindowedLogcat
          --version 4.3.1
          --parser-profile .\data\calcy-parser-profile.synthetic.json
          --out .\out\calcy-verification\provider-selection.json

      - name: Run synthetic screen detection
        run: >-
          dotnet run --project .\src\PogoInventory.Cli --configuration Release --no-build --
          screen-detect --image .\data\screen-fixtures\InventoryList.png
          --profile .\data\screen-profile.synthetic.json
          --out .\out\screen-detection\inventory-list.json

      - name: Extract synthetic screen fingerprint
        run: >-
          dotnet run --project .\src\PogoInventory.Cli --configuration Release --no-build --
          screen-fingerprint --image .\data\screen-fixtures\InventoryList.png
          --region 0.05,0.70,0.25,0.20 --mode Color --width 8 --height 8
          --out .\out\screen-fingerprint\inventory-grid.json

      - name: Build synthetic calibration profile
        run: >-
          dotnet run --project .\src\PogoInventory.Cli --configuration Release --no-build --
          calibration-build-profile --synthetic
          --manifest .\data\calibration\fixture-manifest.synthetic.json
          --anchors .\data\calibration\anchor-plan.synthetic.json
          --fixtures .\data\screen-fixtures
          --out .\out\calibration\screen-profile.generated.json

      - name: Validate synthetic calibration
        run: >-
          dotnet run --project .\src\PogoInventory.Cli --configuration Release --no-build --
          calibration-validate --synthetic
          --manifest .\data\calibration\fixture-manifest.synthetic.json
          --fixtures .\data\screen-fixtures
          --profile .\out\calibration\screen-profile.generated.json
          --out .\out\calibration\acceptance


      - name: Run committed iPhone image pretest
        if: ${{ hashFiles('data/iphone-images/*.png') != '' }}
        run: >-
          dotnet run --project .\src\PogoInventory.Cli --configuration Release --no-build --
          image-pretest
          --input .\data\iphone-images
          --out .\out\iphone-image-pretest
          --min-images 20
          --min-decode-rate 0.90

      - name: Verify committed iPhone image pretest
        if: ${{ hashFiles('data/iphone-images/*.png') != '' }}
        shell: pwsh
        run: |
          $report = Get-Content .\out\iphone-image-pretest\iphone-image-pretest.json -Raw | ConvertFrom-Json
          if (-not $report.accepted) { throw "The committed iPhone screenshot pretest was rejected." }
          if ($report.decodedCount -lt 20) { throw "Expected at least twenty decoded iPhone screenshots." }
          if ($report.decodeRate -lt 0.90) { throw "Expected at least a 90 percent iPhone decode rate." }
          if ($report.portraitCount -ne $report.decodedCount) { throw "Every decoded iPhone screenshot must be portrait." }
          if ($report.failedCount -gt 0) {
            Write-Host "$($report.failedCount) iPhone image(s) were retained as decoder diagnostics."
          }

      - name: Upload validation output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-output
          path: out
          if-no-files-found: warn
